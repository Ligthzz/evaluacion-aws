apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-despacho
  namespace: innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-despacho
  template:
    metadata:
      labels:
        app: front-despacho
    spec:
      containers:
      - name: front-despacho
        image: 235321586510.dkr.ecr.us-east-1.amazonaws.com/front-despacho:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
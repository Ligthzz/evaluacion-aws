apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: innovatech
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "Admin1234!"
        - name: MYSQL_DATABASE
          value: "innovatech"
        - name: MYSQL_USER
          value: "admin"
        - name: MYSQL_PASSWORD
          value: "Admin1234!"
        - name: MYSQL_ROOT_HOST
          value: "%"
        args:
        - --default-authentication-plugin=mysql_native_password
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi